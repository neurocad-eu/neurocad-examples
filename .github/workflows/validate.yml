name: Validate Examples

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Python examples
        run: |
          python -m py_compile python/submit_job.py
          python -m py_compile webhooks/receiver.py

      - name: Validate JavaScript examples
        run: node --check javascript/submit_job.mjs

      - name: Validate shell examples
        run: bash -n curl/submit_job.sh
